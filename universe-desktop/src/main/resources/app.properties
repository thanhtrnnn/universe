# ====== PostgreSQL ======
db.url=jdbc:postgresql://localhost:5433/universe
db.user=universe
db.password=universe

# ====== Redis ======
redis.host=localhost
redis.port=6379
# TTL phiên đăng nhập (giây)
redis.session.ttl=900

# ====== Kafka ======
kafka.bootstrap=localhost:9092
kafka.topic.notifications=universe.notifications
kafka.consumer.group=universe-notification-consumer

# ====== Approximate desktop location ======
location.api.url=https://ipwho.is/
location.api.timeout.seconds=8
