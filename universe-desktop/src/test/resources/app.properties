# ============================================================================
# Cấu hình DÀNH RIÊNG cho unit test (override app.properties ở main/resources).
# Maven đặt test/resources TRƯỚC main/resources trên classpath khi chạy test,
# nên AppConfig sẽ nạp file này. Mục tiêu: bộ test hoàn toàn hermetic —
# KHÔNG kết nối Postgres/Redis/Kafka thật. Các DAO được test bằng JDBC mock,
# còn các giá trị dưới đây chỉ là placeholder để AppConfig khởi tạo không lỗi.
# ============================================================================

# DB giả - không bao giờ được dùng vì DAO.getConnection() đã bị mock.
db.url=jdbc:postgresql://localhost:5432/test
db.user=test
db.password=test

# Redis giả - không dùng trong test.
redis.host=localhost
redis.port=6379
redis.password=
redis.ssl=false
redis.timeout=1000
redis.session.ttl=900

# Kafka TẮT -> KafkaUtil.PRODUCER=null, publish() là no-op, không có I/O mạng.
kafka.enabled=false
kafka.topic.notifications=universe.notifications

mobile.api.base.url=http://localhost/api/
